// localStorage shim that mimics the artifact storage API used in the source.
window.storage = window.storage || {
  async get(key) {
    const v = localStorage.getItem(key);
    return v != null ? { key, value: v, shared: false } : null;
  },
  async set(key, value) {
    localStorage.setItem(key, value);
    return { key, value, shared: false };
  },
  async delete(key) {
    localStorage.removeItem(key);
    return { key, deleted: true, shared: false };
  },
  async list(prefix = '') {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(prefix)) keys.push(k);
    }
    return { keys, prefix, shared: false };
  },
};

// ─────────────────────────────────────────────────────────────────────────────
// .ic save file (gzipped JSON) parser & builder
// Format:  { name, version, created, updated, instances, items: [{id, text, emoji, recipes?}] }
// recipes: array of [ingredientIdA, ingredientIdB] pairs
// ─────────────────────────────────────────────────────────────────────────────
async function gunzipToText(arrayBuffer) {
  const stream = new Blob([arrayBuffer]).stream().pipeThrough(new DecompressionStream('gzip'));
  return await new Response(stream).text();
}
async function gzipText(text) {
  const stream = new Blob([text]).stream().pipeThrough(new CompressionStream('gzip'));
  return await new Response(stream).blob();
}

async function parseICFile(file) {
  const buf = await file.arrayBuffer();
  const bytes = new Uint8Array(buf);
  let jsonText;
  // gzip magic 1f 8b
  if (bytes.length >= 2 && bytes[0] === 0x1f && bytes[1] === 0x8b) {
    jsonText = await gunzipToText(buf);
  } else {
    jsonText = new TextDecoder().decode(bytes);
  }
  const data = JSON.parse(jsonText);
  const items = data.items || [];
  const idToItem = new Map(items.map(it => [it.id, it]));

  const elements = items.map(it => ({
    name: it.text,
    emoji: it.emoji || '✨',
  }));

  const recipes = [];
  for (const it of items) {
    if (Array.isArray(it.recipes)) {
      for (const pair of it.recipes) {
        if (!Array.isArray(pair) || pair.length < 2) continue;
        const a = idToItem.get(pair[0]);
        const b = idToItem.get(pair[1]);
        if (!a || !b) continue;
        recipes.push({
          id: (crypto.randomUUID && crypto.randomUUID()) || `${it.id}-${pair[0]}-${pair[1]}-${Math.random()}`,
          a: a.text,
          b: b.text,
          result: it.text,
        });
      }
    }
  }
  return {
    elements,
    recipes,
    meta: {
      name: data.name || file.name.replace(/\.ic$/i, ''),
      version: data.version,
      created: data.created,
      updated: data.updated,
      itemCount: items.length,
    },
  };
}

async function buildICBlob(elements, recipes, saveName = 'Crucible export') {
  // Topological order: by depth ascending, then by name. Guarantees ingredients come before results.
  const depths = computeDepths(elements, recipes);
  const ordered = [...elements].sort((a, b) => {
    const da = depths.get(a.name) ?? 0, db = depths.get(b.name) ?? 0;
    if (da !== db) return da - db;
    return a.name.localeCompare(b.name);
  });
  const items = ordered.map((el, i) => ({ id: i, text: el.name, emoji: el.emoji }));
  const nameToId = new Map(items.map(it => [it.text, it.id]));

  const byResult = new Map();
  for (const r of recipes) {
    const ai = nameToId.get(r.a), bi = nameToId.get(r.b);
    if (ai == null || bi == null) continue;
    if (!byResult.has(r.result)) byResult.set(r.result, []);
    byResult.get(r.result).push([ai, bi]);
  }
  for (const it of items) {
    const recs = byResult.get(it.text);
    if (recs && recs.length > 0) it.recipes = recs;
  }

  const now = Date.now();
  const obj = {
    name: saveName,
    version: '1.0',
    created: now,
    updated: now,
    instances: [],
    items,
  };
  return await gzipText(JSON.stringify(obj));
}

// ─────────────────────────────────────────────────────────────────────────────
// Depth computation (base elements → derived elements)
// ─────────────────────────────────────────────────────────────────────────────
function computeDepths(elements, recipes) {
  const depths = new Map();
  elements.forEach(e => depths.set(e.name, null));

  const isResult = new Set(recipes.map(r => r.result));
  elements.forEach(e => {
    if (!isResult.has(e.name)) depths.set(e.name, 0);
  });

  let changed = true;
  let iter = 0;
  while (changed && iter < 200) {
    changed = false;
    for (const r of recipes) {
      const da = depths.get(r.a);
      const db = depths.get(r.b);
      if (da != null && db != null) {
        const nd = Math.max(da, db) + 1;
        const cur = depths.get(r.result);
        if (cur == null || nd < cur) {
          depths.set(r.result, nd);
          changed = true;
        }
      }
    }
    iter++;
  }
  elements.forEach(e => { if (depths.get(e.name) == null) depths.set(e.name, 0); });
  return depths;
}

// Warm-to-cool palette by depth (alchemical: gold → copper → rose → violet → indigo)
function depthColor(depth, maxDepth) {
  const stops = [
    [212, 162, 83],   // gold
    [201, 110, 70],   // copper
    [186, 85, 95],    // rose
    [142, 82, 132],   // violet
    [88, 84, 156],    // indigo
    [62, 96, 140],    // steel blue
  ];
  if (maxDepth === 0) return `rgb(${stops[0].join(',')})`;
  const t = Math.min(depth / Math.max(maxDepth, 1), 1);
  const idx = t * (stops.length - 1);
  const i = Math.floor(idx);
  const f = idx - i;
  const a = stops[i];
  const b = stops[Math.min(i + 1, stops.length - 1)];
  const r = Math.round(a[0] + (b[0] - a[0]) * f);
  const g = Math.round(a[1] + (b[1] - a[1]) * f);
  const bl = Math.round(a[2] + (b[2] - a[2]) * f);
  return `rgb(${r},${g},${bl})`;
}

// ─────────────────────────────────────────────────────────────────────────────
// Element combobox: typeahead from existing elements
// ─────────────────────────────────────────────────────────────────────────────
function ElementCombobox({ value, onChange, elements, placeholder, exclude = [] }) {
  const [open, setOpen] = useState(false);
  const [query, setQuery] = useState(value || '');
  const wrapRef = useRef(null);

  useEffect(() => { setQuery(value || ''); }, [value]);

  useEffect(() => {
    const onDown = (e) => {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener('mousedown', onDown);
    return () => document.removeEventListener('mousedown', onDown);
  }, []);

  const matches = useMemo(() => {
    const q = query.toLowerCase().trim();
    return elements
      .filter(e => !exclude.includes(e.name))
      .filter(e => !q || e.name.toLowerCase().includes(q))
      .slice(0, 8);
  }, [query, elements, exclude]);

  return (
    <div ref={wrapRef} className="relative">
      <input
        value={query}
        onChange={(e) => { setQuery(e.target.value); onChange(e.target.value); setOpen(true); }}
        onFocus={() => setOpen(true)}
        placeholder={placeholder}
        className="w-full bg-stone-950/60 border border-stone-700/60 rounded-md px-3 py-2 text-sm text-stone-100 placeholder-stone-500 focus:outline-none focus:border-amber-700/70 focus:ring-1 focus:ring-amber-700/40 font-mono"
      />
      {open && matches.length > 0 && (
        <div className="absolute top-full left-0 right-0 mt-1 bg-stone-900 border border-stone-700 rounded-md shadow-2xl shadow-black/50 z-30 max-h-56 overflow-y-auto">
          {matches.map(e => (
            <button
              key={e.name}
              type="button"
              onClick={() => { onChange(e.name); setQuery(e.name); setOpen(false); }}
              className="w-full text-left px-3 py-1.5 text-sm hover:bg-stone-800 flex items-center gap-2 font-mono text-stone-200"
            >
              <span className="text-base">{e.emoji}</span>
              <span>{e.name}</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// Graph canvas: d3 force simulation rendered to SVG with pan/zoom/drag
// ─────────────────────────────────────────────────────────────────────────────
function GraphCanvas({
  elements, recipes, selected, onSelect, search, hideIsolated, depthMap, maxDepth, resetKey
}) {
  const svgRef = useRef(null);
  const wrapRef = useRef(null);
  const simRef = useRef(null);
  const nodesRef = useRef([]);
  const linksRef = useRef([]);
  const [, setTick] = useState(0);
  const [size, setSize] = useState({ w: 800, h: 600 });
  const [transform, setTransform] = useState({ x: 0, y: 0, k: 1 });
  const transformRef = useRef(transform);
  transformRef.current = transform;

  const dragRef = useRef(null);
  const panRef = useRef(null);

  // Resize observer
  useEffect(() => {
    if (!wrapRef.current) return;
    const ro = new ResizeObserver(entries => {
      for (const e of entries) {
        setSize({ w: e.contentRect.width, h: e.contentRect.height });
      }
    });
    ro.observe(wrapRef.current);
    return () => ro.disconnect();
  }, []);

  // Build graph data
  const { graphNodes, graphLinks, isolatedSet, neighborMap } = useMemo(() => {
    const nodes = elements.map(e => ({
      id: e.name,
      name: e.name,
      emoji: e.emoji || '✨',
      depth: depthMap.get(e.name) ?? 0,
    }));
    const links = [];
    recipes.forEach((r, i) => {
      links.push({ source: r.a, target: r.result, key: `${r.id || i}-a`, recipeId: r.id });
      if (r.a !== r.b) {
        links.push({ source: r.b, target: r.result, key: `${r.id || i}-b`, recipeId: r.id });
      }
    });
    const connected = new Set();
    links.forEach(l => {
      const s = typeof l.source === 'string' ? l.source : l.source.id;
      const t = typeof l.target === 'string' ? l.target : l.target.id;
      connected.add(s); connected.add(t);
    });
    const isolatedSet = new Set(nodes.filter(n => !connected.has(n.id)).map(n => n.id));

    const neighborMap = new Map();
    nodes.forEach(n => neighborMap.set(n.id, new Set()));
    links.forEach(l => {
      const s = typeof l.source === 'string' ? l.source : l.source.id;
      const t = typeof l.target === 'string' ? l.target : l.target.id;
      neighborMap.get(s)?.add(t);
      neighborMap.get(t)?.add(s);
    });

    return { graphNodes: nodes, graphLinks: links, isolatedSet, neighborMap };
  }, [elements, recipes, depthMap]);

  const visibleNodes = useMemo(() => {
    return hideIsolated ? graphNodes.filter(n => !isolatedSet.has(n.id)) : graphNodes;
  }, [graphNodes, isolatedSet, hideIsolated]);

  const visibleNodeIds = useMemo(() => new Set(visibleNodes.map(n => n.id)), [visibleNodes]);

  const visibleLinks = useMemo(() => {
    return graphLinks.filter(l => {
      const s = typeof l.source === 'string' ? l.source : l.source.id;
      const t = typeof l.target === 'string' ? l.target : l.target.id;
      return visibleNodeIds.has(s) && visibleNodeIds.has(t);
    });
  }, [graphLinks, visibleNodeIds]);

  // Set up / update the simulation, preserving positions of existing nodes
  useEffect(() => {
    const prev = new Map();
    nodesRef.current.forEach(n => prev.set(n.id, { x: n.x, y: n.y, vx: n.vx, vy: n.vy, fx: n.fx, fy: n.fy }));

    const simNodes = visibleNodes.map(n => {
      const p = prev.get(n.id);
      if (p) return { ...n, ...p };
      // seed a position near origin
      return { ...n, x: (Math.random() - 0.5) * 200, y: (Math.random() - 0.5) * 200 };
    });
    const simLinks = visibleLinks.map(l => ({
      source: typeof l.source === 'string' ? l.source : l.source.id,
      target: typeof l.target === 'string' ? l.target : l.target.id,
      key: l.key,
      recipeId: l.recipeId,
    }));

    nodesRef.current = simNodes;
    linksRef.current = simLinks;

    if (simRef.current) simRef.current.stop();

    const sim = d3.forceSimulation(simNodes)
      .force('link', d3.forceLink(simLinks).id(d => d.id).distance(95).strength(0.45))
      .force('charge', d3.forceManyBody().strength(-260))
      .force('center', d3.forceCenter(0, 0).strength(0.05))
      .force('collide', d3.forceCollide().radius(38))
      .force('y', d3.forceY().strength(0.02))
      .force('x', d3.forceX().strength(0.02))
      .alpha(0.7)
      .alphaDecay(0.025)
      .velocityDecay(0.42)
      .on('tick', () => setTick(t => t + 1));

    simRef.current = sim;
    return () => sim.stop();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [visibleNodes.length, visibleLinks.length, resetKey]);

  // Reheat when membership changes mildly
  useEffect(() => {
    if (simRef.current) simRef.current.alpha(0.4).restart();
  }, [visibleNodes, visibleLinks]);

  // Pan & zoom handlers
  const onWheel = useCallback((e) => {
    e.preventDefault();
    const svg = svgRef.current;
    if (!svg) return;
    const rect = svg.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const scale = Math.exp(-e.deltaY * 0.0015);
    setTransform(prev => {
      const nk = Math.max(0.2, Math.min(4, prev.k * scale));
      const factor = nk / prev.k;
      return {
        k: nk,
        x: mx - (mx - prev.x) * factor,
        y: my - (my - prev.y) * factor,
      };
    });
  }, []);

  const onMouseDownBg = useCallback((e) => {
    if (e.target.closest('[data-node]')) return;
    panRef.current = { x: e.clientX, y: e.clientY, tx: transformRef.current.x, ty: transformRef.current.y };
    onSelect(null);
  }, [onSelect]);

  useEffect(() => {
    const onMove = (e) => {
      if (panRef.current) {
        const dx = e.clientX - panRef.current.x;
        const dy = e.clientY - panRef.current.y;
        setTransform(t => ({ ...t, x: panRef.current.tx + dx, y: panRef.current.ty + dy }));
      }
      if (dragRef.current) {
        const svg = svgRef.current;
        if (!svg) return;
        const rect = svg.getBoundingClientRect();
        const wx = (e.clientX - rect.left - transformRef.current.x) / transformRef.current.k;
        const wy = (e.clientY - rect.top - transformRef.current.y) / transformRef.current.k;
        const node = dragRef.current.node;
        node.fx = wx; node.fy = wy;
        if (simRef.current) simRef.current.alpha(0.3).restart();
      }
    };
    const onUp = () => {
      panRef.current = null;
      if (dragRef.current) {
        // keep pinned to where the user dropped it
        dragRef.current = null;
      }
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
  }, []);

  const onNodeMouseDown = (e, node) => {
    e.stopPropagation();
    dragRef.current = { node };
    node.fx = node.x; node.fy = node.y;
  };
  const onNodeClick = (e, node) => {
    e.stopPropagation();
    onSelect(node.id);
  };
  const onNodeDoubleClick = (e, node) => {
    e.stopPropagation();
    // unpin
    node.fx = null; node.fy = null;
    if (simRef.current) simRef.current.alpha(0.5).restart();
  };

  // Search match set
  const searchSet = useMemo(() => {
    const q = (search || '').toLowerCase().trim();
    if (!q) return null;
    return new Set(visibleNodes.filter(n => n.name.toLowerCase().includes(q)).map(n => n.id));
  }, [search, visibleNodes]);

  // Selected node + neighbors
  const highlightSet = useMemo(() => {
    if (!selected) return null;
    const s = new Set([selected]);
    neighborMap.get(selected)?.forEach(n => s.add(n));
    return s;
  }, [selected, neighborMap]);

  // Fit to view
  const fitToView = useCallback(() => {
    if (nodesRef.current.length === 0) {
      setTransform({ x: size.w / 2, y: size.h / 2, k: 1 });
      return;
    }
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    nodesRef.current.forEach(n => {
      if (n.x < minX) minX = n.x;
      if (n.y < minY) minY = n.y;
      if (n.x > maxX) maxX = n.x;
      if (n.y > maxY) maxY = n.y;
    });
    const pad = 80;
    const w = maxX - minX + pad * 2;
    const h = maxY - minY + pad * 2;
    const k = Math.min(size.w / w, size.h / h, 1.5);
    const cx = (minX + maxX) / 2;
    const cy = (minY + maxY) / 2;
    setTransform({ k, x: size.w / 2 - cx * k, y: size.h / 2 - cy * k });
  }, [size]);

  // Initial center
  useEffect(() => {
    setTransform(t => (t.x === 0 && t.y === 0 ? { ...t, x: size.w / 2, y: size.h / 2 } : t));
  }, [size.w, size.h]);

  // Node width estimate
  const nodeWidth = (name) => Math.max(60, name.length * 7.2 + 32);
  const NODE_H = 30;

  return (
    <div ref={wrapRef} className="relative w-full h-full overflow-hidden bg-[#0e0c0a]"
         style={{
           backgroundImage: `radial-gradient(ellipse at 20% 10%, rgba(212,162,83,0.06), transparent 50%),
                             radial-gradient(ellipse at 80% 80%, rgba(88,84,156,0.06), transparent 50%),
                             radial-gradient(circle at 50% 50%, #14110e 0%, #0b0907 100%)`,
         }}>
      {/* Grain overlay */}
      <div className="absolute inset-0 pointer-events-none opacity-[0.04] mix-blend-overlay"
           style={{
             backgroundImage: `url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")`,
           }} />

      {/* Toolbar */}
      <div className="absolute top-4 right-4 z-20 flex items-center gap-1 bg-stone-950/80 backdrop-blur-md border border-stone-700/60 rounded-lg p-1 shadow-2xl shadow-black/40">
        <button onClick={() => setTransform(t => ({ ...t, k: Math.min(4, t.k * 1.2) }))}
                className="p-2 hover:bg-stone-800 rounded text-stone-300" title="Zoom in">
          <ZoomIn size={16} />
        </button>
        <button onClick={() => setTransform(t => ({ ...t, k: Math.max(0.2, t.k / 1.2) }))}
                className="p-2 hover:bg-stone-800 rounded text-stone-300" title="Zoom out">
          <ZoomOut size={16} />
        </button>
        <button onClick={fitToView}
                className="p-2 hover:bg-stone-800 rounded text-stone-300" title="Fit to view">
          <Maximize size={16} />
        </button>
        <div className="w-px h-5 bg-stone-700 mx-0.5" />
        <button onClick={() => {
          nodesRef.current.forEach(n => { n.fx = null; n.fy = null; n.x = (Math.random()-0.5)*200; n.y = (Math.random()-0.5)*200; });
          if (simRef.current) simRef.current.alpha(1).restart();
        }} className="p-2 hover:bg-stone-800 rounded text-stone-300" title="Re-randomize layout">
          <RotateCcw size={16} />
        </button>
      </div>

      {/* Zoom indicator */}
      <div className="absolute bottom-4 right-4 z-20 px-2.5 py-1 bg-stone-950/70 backdrop-blur-md border border-stone-700/60 rounded text-[11px] font-mono text-stone-400">
        {Math.round(transform.k * 100)}%
      </div>

      {/* Empty state */}
      {visibleNodes.length === 0 && (
        <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
          <div className="text-center max-w-sm px-6">
            <FlaskConical className="mx-auto text-amber-700/60" size={36} />
            <p className="mt-4 text-stone-400 text-sm font-mono">
              The crucible is empty. Import a save or log your first recipe to begin.
            </p>
          </div>
        </div>
      )}

      <svg
        ref={svgRef}
        width={size.w}
        height={size.h}
        onWheel={onWheel}
        onMouseDown={onMouseDownBg}
        style={{ cursor: panRef.current ? 'grabbing' : 'grab', userSelect: 'none' }}
      >
        <defs>
          <marker id="arrow" viewBox="0 -5 10 10" refX="8" refY="0" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M0,-5L10,0L0,5" fill="rgba(212,162,83,0.55)" />
          </marker>
          <marker id="arrow-dim" viewBox="0 -5 10 10" refX="8" refY="0" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M0,-5L10,0L0,5" fill="rgba(120,110,95,0.25)" />
          </marker>
          <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="coloredBlur" />
            <feMerge>
              <feMergeNode in="coloredBlur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>

        <g transform={`translate(${transform.x},${transform.y}) scale(${transform.k})`}>
          {/* Edges */}
          <g>
            {linksRef.current.map((l, i) => {
              const s = l.source, t = l.target;
              if (!s || !t || typeof s !== 'object' || typeof t !== 'object') return null;
              const sId = s.id, tId = t.id;
              const dimmed = (highlightSet && !(highlightSet.has(sId) && highlightSet.has(tId)))
                          || (searchSet && !(searchSet.has(sId) || searchSet.has(tId)));
              const stroke = dimmed ? 'rgba(120,110,95,0.15)' : 'rgba(212,162,83,0.45)';
              // shorten the line to leave room for arrow + node padding
              const dx = t.x - s.x, dy = t.y - s.y;
              const len = Math.sqrt(dx*dx + dy*dy) || 1;
              const tw = nodeWidth(t.name) / 2 + 4;
              const sw = nodeWidth(s.name) / 2 + 4;
              const x1 = s.x + (dx / len) * sw;
              const y1 = s.y + (dy / len) * (NODE_H/2 + 2);
              const x2 = t.x - (dx / len) * tw;
              const y2 = t.y - (dy / len) * (NODE_H/2 + 2);
              return (
                <line
                  key={l.key || i}
                  x1={x1} y1={y1} x2={x2} y2={y2}
                  stroke={stroke}
                  strokeWidth={dimmed ? 0.8 : 1.2}
                  markerEnd={`url(#${dimmed ? 'arrow-dim' : 'arrow'})`}
                />
              );
            })}
          </g>

          {/* Nodes */}
          <g>
            {nodesRef.current.map((n) => {
              const w = nodeWidth(n.name);
              const isSelected = selected === n.id;
              const dimmed = (highlightSet && !highlightSet.has(n.id))
                          || (searchSet && !searchSet.has(n.id));
              const currentDepth = depthMap.get(n.id) ?? n.depth ?? 0;
              const fill = depthColor(currentDepth, maxDepth);
              const opacity = dimmed ? 0.25 : 1;
              return (
                <g
                  key={n.id}
                  data-node
                  transform={`translate(${n.x - w/2},${n.y - NODE_H/2})`}
                  onMouseDown={(e) => onNodeMouseDown(e, n)}
                  onClick={(e) => onNodeClick(e, n)}
                  onDoubleClick={(e) => onNodeDoubleClick(e, n)}
                  style={{ cursor: 'pointer', opacity }}
                >
                  {/* outer glow for selected */}
                  {isSelected && (
                    <rect x={-3} y={-3} width={w+6} height={NODE_H+6} rx={(NODE_H+6)/2}
                          fill="none" stroke={fill} strokeWidth={1.5} opacity={0.5} filter="url(#glow)" />
                  )}
                  <rect
                    width={w} height={NODE_H} rx={NODE_H/2}
                    fill="rgba(20,17,14,0.92)"
                    stroke={fill}
                    strokeWidth={isSelected ? 1.6 : 1}
                  />
                  <rect
                    width={w} height={NODE_H} rx={NODE_H/2}
                    fill={fill}
                    opacity={0.13}
                  />
                  <text x={14} y={NODE_H/2 + 5} fontSize="14" textAnchor="start"
                        style={{ pointerEvents: 'none' }}>
                    {n.emoji}
                  </text>
                  <text x={34} y={NODE_H/2 + 4} fontSize="11.5"
                        fill="#f1e6d0"
                        fontFamily="'JetBrains Mono', ui-monospace, monospace"
                        fontWeight="500"
                        style={{ pointerEvents: 'none' }}>
                    {n.name}
                  </text>
                  {n.fx != null && (
                    <circle cx={w-7} cy={7} r={2.5} fill="rgba(212,162,83,0.7)" style={{ pointerEvents: 'none' }} />
                  )}
                </g>
              );
            })}
          </g>
        </g>
      </svg>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// Main app
// ─────────────────────────────────────────────────────────────────────────────
function App() {
  const [elements, setElements] = useState([]);
  const [recipes, setRecipes] = useState([]);
  const [loaded, setLoaded] = useState(false);

  const [activeTab, setActiveTab] = useState('add'); // 'add' | 'import' | 'search' | 'about'
  const [selected, setSelected] = useState(null);
  const [search, setSearch] = useState('');
  const [hideIsolated, setHideIsolated] = useState(false);
  const [resetKey, setResetKey] = useState(0);

  // Recipe form state
  const [aName, setAName] = useState('');
  const [bName, setBName] = useState('');
  const [resName, setResName] = useState('');
  const [resEmoji, setResEmoji] = useState('');
  const [formError, setFormError] = useState('');

  // Import state
  const [importText, setImportText] = useState('');
  const [importMsg, setImportMsg] = useState('');
  const [importMeta, setImportMeta] = useState(null); // { name, updated, ... }
  const [dragOver, setDragOver] = useState(false);
  const fileInputRef = useRef(null);

  // Load on mount
  useEffect(() => {
    (async () => {
      try {
        const r = await window.storage.get(STORAGE_KEY);
        if (r?.value) {
          const data = JSON.parse(r.value);
          setElements(data.elements || []);
          setRecipes(data.recipes || []);
        } else {
          setElements(BASE_ELEMENTS);
          setRecipes([]);
        }
      } catch (e) {
        setElements(BASE_ELEMENTS);
        setRecipes([]);
      }
      setLoaded(true);
    })();
  }, []);

  // Save on change
  useEffect(() => {
    if (!loaded) return;
    (async () => {
      try {
        await window.storage.set(STORAGE_KEY, JSON.stringify({ elements, recipes }));
      } catch (e) { /* ignore */ }
    })();
  }, [elements, recipes, loaded]);

  const elementMap = useMemo(() => {
    const m = new Map();
    elements.forEach(e => m.set(e.name, e));
    return m;
  }, [elements]);

  const depthMap = useMemo(() => computeDepths(elements, recipes), [elements, recipes]);
  const maxDepth = useMemo(() => Math.max(0, ...Array.from(depthMap.values())), [depthMap]);

  // Auto-fill emoji when result name matches existing
  useEffect(() => {
    const existing = elementMap.get(resName.trim());
    if (existing && !resEmoji) setResEmoji(existing.emoji);
  }, [resName, elementMap, resEmoji]);

  const submitRecipe = (e) => {
    e?.preventDefault?.();
    setFormError('');
    const a = aName.trim(), b = bName.trim(), r = resName.trim();
    if (!a || !b || !r) { setFormError('All three fields are required.'); return; }
    if (!elementMap.get(a)) { setFormError(`"${a}" isn't in your elements yet.`); return; }
    if (!elementMap.get(b)) { setFormError(`"${b}" isn't in your elements yet.`); return; }
    // Add result element if new
    let newElements = elements;
    if (!elementMap.get(r)) {
      newElements = [...elements, { name: r, emoji: resEmoji.trim() || '✨' }];
    } else if (resEmoji.trim() && elementMap.get(r).emoji !== resEmoji.trim()) {
      newElements = elements.map(el => el.name === r ? { ...el, emoji: resEmoji.trim() } : el);
    }
    // Avoid exact duplicates (a,b,r unordered for ingredients)
    const dupe = recipes.find(rec =>
      rec.result === r && ((rec.a === a && rec.b === b) || (rec.a === b && rec.b === a))
    );
    if (dupe) { setFormError('You already logged this recipe.'); return; }
    const newRecipe = { id: crypto.randomUUID?.() || String(Date.now()) + Math.random(), a, b, result: r };
    setElements(newElements);
    setRecipes([...recipes, newRecipe]);
    setAName(''); setBName(''); setResName(''); setResEmoji('');
  };

  const deleteRecipe = (id) => {
    setRecipes(recipes.filter(r => r.id !== id));
  };

  const removeElement = (name) => {
    if (!confirm(`Remove "${name}" and all recipes that involve it?`)) return;
    setElements(elements.filter(e => e.name !== name));
    setRecipes(recipes.filter(r => r.a !== name && r.b !== name && r.result !== name));
    if (selected === name) setSelected(null);
  };

  // Merge incoming elements/recipes into current state, deduping
  const mergeImport = (incomingEls, incomingRecipes) => {
    const elMap = new Map(elements.map(e => [e.name, e]));
    let addedEls = 0;
    incomingEls.forEach(e => {
      if (!elMap.has(e.name)) { elMap.set(e.name, e); addedEls++; }
      else if (e.emoji && elMap.get(e.name).emoji === '✨') {
        elMap.set(e.name, { ...elMap.get(e.name), emoji: e.emoji });
      }
    });

    // Dedupe recipes by (sorted-pair, result)
    const recipeKey = (r) => {
      const [x, y] = [r.a, r.b].sort();
      return `${x}||${y}||${r.result}`;
    };
    const existingKeys = new Set(recipes.map(recipeKey));
    const newRecipes = [];
    let addedRec = 0;
    for (const r of incomingRecipes) {
      const k = recipeKey(r);
      if (!existingKeys.has(k)) {
        existingKeys.add(k);
        newRecipes.push(r);
        addedRec++;
      }
    }

    setElements(Array.from(elMap.values()));
    setRecipes([...recipes, ...newRecipes]);
    return { addedEls, addedRec, totalEls: incomingEls.length, totalRec: incomingRecipes.length };
  };

  // Read & import a .ic file (or json file) the user dropped or picked
  const handleICFile = async (file) => {
    setImportMsg('');
    setImportMeta(null);
    try {
      const parsed = await parseICFile(file);
      const stats = mergeImport(parsed.elements, parsed.recipes);
      setImportMeta(parsed.meta);
      setImportMsg(
        `Imported "${parsed.meta.name}" — ${stats.totalEls} elements (${stats.addedEls} new), ${stats.totalRec} recipes (${stats.addedRec} new).`
      );
    } catch (err) {
      setImportMsg(`Couldn't read that file. ${err?.message || 'Make sure it is a .ic save export.'}`);
    }
  };

  // Paste-JSON: handles both legacy localStorage shape and graph exports
  const importPastedJSON = () => {
    setImportMsg('');
    setImportMeta(null);
    try {
      const data = JSON.parse(importText);
      // Graph export shape (our own format)
      if (Array.isArray(data.elements) && Array.isArray(data.recipes)
          && data.elements.length > 0 && typeof data.elements[0]?.name === 'string') {
        setElements(data.elements);
        setRecipes(data.recipes);
        setImportMsg(`Loaded graph: ${data.elements.length} elements, ${data.recipes.length} recipes.`);
        setImportText('');
        return;
      }
      // .ic shape pasted as text (uncompressed JSON)
      if (Array.isArray(data.items)) {
        const idToItem = new Map(data.items.map(it => [it.id, it]));
        const els = data.items.map(it => ({ name: it.text, emoji: it.emoji || '✨' }));
        const recs = [];
        for (const it of data.items) {
          if (Array.isArray(it.recipes)) {
            for (const pair of it.recipes) {
              const a = idToItem.get(pair[0]), b = idToItem.get(pair[1]);
              if (a && b) recs.push({
                id: (crypto.randomUUID && crypto.randomUUID()) || `${it.id}-${pair[0]}-${pair[1]}`,
                a: a.text, b: b.text, result: it.text,
              });
            }
          }
        }
        const stats = mergeImport(els, recs);
        setImportMsg(`Imported ${stats.totalEls} elements (${stats.addedEls} new), ${stats.totalRec} recipes (${stats.addedRec} new).`);
        setImportText('');
        return;
      }
      // Legacy localStorage shape
      let importedEls = [];
      if (Array.isArray(data)) {
        importedEls = data.filter(e => e?.text || e?.name).map(e => ({ name: e.text || e.name, emoji: e.emoji || '✨' }));
      } else if (Array.isArray(data.elements)) {
        importedEls = data.elements.filter(e => e?.text || e?.name).map(e => ({ name: e.text || e.name, emoji: e.emoji || '✨' }));
      }
      if (importedEls.length === 0) { setImportMsg('No elements found in that JSON.'); return; }
      const stats = mergeImport(importedEls, []);
      setImportMsg(`Imported ${stats.totalEls} elements (${stats.addedEls} new). No recipe data in that format.`);
      setImportText('');
    } catch (err) {
      setImportMsg('Invalid JSON.');
    }
  };

  // Export as our own JSON (round-trip with the tool)
  const exportData = () => {
    const blob = new Blob([JSON.stringify({ elements, recipes }, null, 2)], { type: 'application/json' });
    triggerDownload(blob, 'infinite-craft-graph.json');
  };

  // Export as .ic file (gzipped, importable back into the game)
  const exportIC = async () => {
    try {
      const blob = await buildICBlob(elements, recipes, 'Crucible export');
      const stamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 16);
      triggerDownload(blob, `Crucible_${stamp}.ic`);
    } catch (err) {
      setImportMsg(`Export failed: ${err?.message || 'unknown error'}`);
    }
  };

  const triggerDownload = (blob, filename) => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const wipeAll = () => {
    if (!confirm('Erase all elements and recipes?')) return;
    setElements(BASE_ELEMENTS);
    setRecipes([]);
    setSelected(null);
  };

  // Selected element details
  const selectedDetails = useMemo(() => {
    if (!selected) return null;
    const el = elementMap.get(selected);
    if (!el) return null;
    const madeBy = recipes.filter(r => r.result === selected);
    const usedIn = recipes.filter(r => r.a === selected || r.b === selected);
    return { el, madeBy, usedIn, depth: depthMap.get(selected) ?? 0 };
  }, [selected, elementMap, recipes, depthMap]);

  if (!loaded) {
    return (
      <div className="w-full h-screen bg-[#0b0907] flex items-center justify-center">
        <div className="text-amber-700 font-mono text-sm">loading the lab...</div>
      </div>
    );
  }

  return (
    <div className="w-full h-screen flex flex-col bg-[#0b0907] text-stone-200 overflow-hidden"
         style={{ fontFamily: "'Geist', system-ui, sans-serif" }}>
      <style>{`
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(120,110,95,0.3); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(120,110,95,0.5); }
      `}</style>

      {/* Header */}
      <header className="flex items-center justify-between px-6 py-3 border-b border-stone-800/80 bg-gradient-to-r from-stone-950 via-[#100d0a] to-stone-950">
        <div className="flex items-center gap-3">
          <div className="relative">
            <Atom className="text-amber-700/80" size={22} strokeWidth={1.4} />
            <div className="absolute inset-0 blur-md bg-amber-700/30 -z-10" />
          </div>
          <div>
            <h1 style={{ fontFamily: "'Fraunces', serif", fontVariationSettings: "'opsz' 144, 'SOFT' 100" }}
                className="text-xl tracking-tight text-stone-100 font-light leading-none">
              Crucible
            </h1>
            <p className="text-[10px] uppercase tracking-[0.25em] text-stone-500 font-mono mt-0.5">
              Recipe atlas for Infinite Craft
            </p>
          </div>
        </div>
        <div className="flex items-center gap-3 text-xs font-mono">
          <span className="text-stone-500">
            <span className="text-amber-700">{elements.length}</span> elements
          </span>
          <span className="text-stone-700">·</span>
          <span className="text-stone-500">
            <span className="text-amber-700">{recipes.length}</span> recipes
          </span>
          <span className="text-stone-700">·</span>
          <span className="text-stone-500">
            depth <span className="text-amber-700">{maxDepth}</span>
          </span>
        </div>
      </header>

      <div className="flex-1 flex min-h-0">
        {/* Sidebar */}
        <aside className="w-[340px] flex-shrink-0 border-r border-stone-800/80 bg-[#0d0a08] flex flex-col">
          {/* Tabs */}
          <div className="flex border-b border-stone-800/80">
            {[
              { id: 'add', label: 'Log', icon: Plus },
              { id: 'import', label: 'Save', icon: Upload },
              { id: 'search', label: 'Browse', icon: Search },
              { id: 'about', label: 'Help', icon: Info },
            ].map(tab => {
              const Icon = tab.icon;
              const active = activeTab === tab.id;
              return (
                <button
                  key={tab.id}
                  onClick={() => setActiveTab(tab.id)}
                  className={`flex-1 px-3 py-3 text-[11px] uppercase tracking-wider font-mono flex items-center justify-center gap-1.5 transition-colors border-b-2 ${
                    active
                      ? 'text-amber-600 border-amber-700/60 bg-stone-950/60'
                      : 'text-stone-500 border-transparent hover:text-stone-300'
                  }`}
                >
                  <Icon size={13} strokeWidth={1.6} />
                  {tab.label}
                </button>
              );
            })}
          </div>

          {/* Tab content */}
          <div className="flex-1 overflow-y-auto">
            {activeTab === 'add' && (
              <div className="p-5">
                <h2 style={{ fontFamily: "'Fraunces', serif" }} className="text-lg text-stone-100 font-light mb-1">
                  Log a recipe
                </h2>
                <p className="text-xs text-stone-500 font-mono mb-5 leading-relaxed">
                  After you discover a combo in the game, write it down here.
                </p>

                <form onSubmit={submitRecipe} className="space-y-3">
                  <div>
                    <label className="block text-[10px] uppercase tracking-widest text-stone-500 font-mono mb-1.5">
                      Ingredient A
                    </label>
                    <ElementCombobox
                      value={aName} onChange={setAName} elements={elements}
                      placeholder="Water" exclude={[]}
                    />
                  </div>

                  <div className="text-center text-amber-700/60 text-lg">+</div>

                  <div>
                    <label className="block text-[10px] uppercase tracking-widest text-stone-500 font-mono mb-1.5">
                      Ingredient B
                    </label>
                    <ElementCombobox
                      value={bName} onChange={setBName} elements={elements}
                      placeholder="Fire" exclude={[]}
                    />
                  </div>

                  <div className="text-center text-amber-700/60 font-mono text-xs tracking-widest">→</div>

                  <div>
                    <label className="block text-[10px] uppercase tracking-widest text-stone-500 font-mono mb-1.5">
                      Result
                    </label>
                    <div className="flex gap-2">
                      <input
                        value={resEmoji}
                        onChange={e => setResEmoji(e.target.value)}
                        placeholder="💨"
                        maxLength={4}
                        className="w-14 bg-stone-950/60 border border-stone-700/60 rounded-md px-2 py-2 text-center text-base text-stone-100 placeholder-stone-600 focus:outline-none focus:border-amber-700/70"
                      />
                      <input
                        value={resName}
                        onChange={e => setResName(e.target.value)}
                        placeholder="Steam"
                        className="flex-1 bg-stone-950/60 border border-stone-700/60 rounded-md px-3 py-2 text-sm text-stone-100 placeholder-stone-500 focus:outline-none focus:border-amber-700/70 font-mono"
                      />
                    </div>
                  </div>

                  {formError && (
                    <div className="text-xs text-rose-400/90 font-mono bg-rose-950/30 border border-rose-900/40 rounded px-3 py-2">
                      {formError}
                    </div>
                  )}

                  <button
                    type="submit"
                    className="w-full mt-2 bg-gradient-to-b from-amber-700 to-amber-800 hover:from-amber-600 hover:to-amber-700 text-amber-50 text-xs uppercase tracking-widest font-mono py-2.5 rounded-md transition-all shadow-lg shadow-amber-900/30 border border-amber-600/30"
                  >
                    Forge connection
                  </button>
                </form>

                {/* Recent recipes */}
                {recipes.length > 0 && (
                  <div className="mt-7">
                    <h3 className="text-[10px] uppercase tracking-widest text-stone-500 font-mono mb-2.5">
                      Recent ({recipes.length})
                    </h3>
                    <div className="space-y-1.5">
                      {[...recipes].reverse().slice(0, 25).map(r => {
                        const ea = elementMap.get(r.a), eb = elementMap.get(r.b), er = elementMap.get(r.result);
                        return (
                          <div key={r.id} className="group flex items-center gap-1.5 text-xs font-mono py-1 px-2 rounded hover:bg-stone-900/60">
                            <span className="text-stone-300 truncate flex items-center gap-1">
                              <span>{ea?.emoji}</span><span>{r.a}</span>
                            </span>
                            <span className="text-stone-600">+</span>
                            <span className="text-stone-300 truncate flex items-center gap-1">
                              <span>{eb?.emoji}</span><span>{r.b}</span>
                            </span>
                            <span className="text-amber-700/70">→</span>
                            <span className="text-stone-100 truncate flex items-center gap-1 flex-1">
                              <span>{er?.emoji}</span><span>{r.result}</span>
                            </span>
                            <button onClick={() => deleteRecipe(r.id)}
                                    className="opacity-0 group-hover:opacity-100 text-stone-600 hover:text-rose-400 transition-opacity">
                              <X size={12} />
                            </button>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>
            )}

            {activeTab === 'import' && (
              <div className="p-5">
                <h2 style={{ fontFamily: "'Fraunces', serif" }} className="text-lg text-stone-100 font-light mb-1">
                  Import & export
                </h2>
                <p className="text-xs text-stone-500 font-mono mb-5 leading-relaxed">
                  Drop a <span className="text-amber-600">.ic</span> save file from the game, or paste JSON.
                </p>

                {/* Drop zone */}
                <div
                  onClick={() => fileInputRef.current?.click()}
                  onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
                  onDragLeave={() => setDragOver(false)}
                  onDrop={(e) => {
                    e.preventDefault();
                    setDragOver(false);
                    const f = e.dataTransfer.files?.[0];
                    if (f) handleICFile(f);
                  }}
                  className={`relative cursor-pointer rounded-lg border-2 border-dashed transition-all px-4 py-8 text-center ${
                    dragOver
                      ? 'border-amber-600 bg-amber-950/30'
                      : 'border-stone-700/70 hover:border-amber-700/70 hover:bg-stone-950/40'
                  }`}
                >
                  <FileJson className={`mx-auto mb-2 ${dragOver ? 'text-amber-500' : 'text-stone-500'}`} size={28} strokeWidth={1.4} />
                  <p className="text-xs font-mono text-stone-300">
                    Drop <span className="text-amber-600">.ic</span> here
                  </p>
                  <p className="text-[10px] font-mono text-stone-600 mt-1">
                    or click to choose
                  </p>
                  <input
                    ref={fileInputRef}
                    type="file"
                    accept=".ic,application/gzip,application/json"
                    onChange={(e) => {
                      const f = e.target.files?.[0];
                      if (f) handleICFile(f);
                      e.target.value = '';
                    }}
                    className="hidden"
                  />
                </div>

                {/* Imported metadata card */}
                {importMeta && (
                  <div className="mt-3 px-3 py-2.5 bg-stone-950/60 border border-stone-700/60 rounded-md">
                    <div className="flex items-baseline justify-between gap-2">
                      <p style={{ fontFamily: "'Fraunces', serif" }} className="text-sm text-stone-100 truncate">
                        {importMeta.name}
                      </p>
                      <span className="text-[9px] uppercase tracking-widest text-stone-500 font-mono shrink-0">
                        v{importMeta.version || '?'}
                      </span>
                    </div>
                    <p className="text-[10px] text-stone-500 font-mono mt-0.5">
                      {importMeta.itemCount} items
                      {importMeta.updated && ` · updated ${new Date(importMeta.updated).toLocaleDateString()}`}
                    </p>
                  </div>
                )}

                {importMsg && (
                  <div className="mt-3 text-xs text-amber-600/90 font-mono bg-amber-950/20 border border-amber-900/40 rounded px-3 py-2 leading-relaxed">
                    {importMsg}
                  </div>
                )}

                {/* Paste JSON (legacy / advanced) */}
                <details className="mt-6 group">
                  <summary className="text-[10px] uppercase tracking-widest text-stone-500 font-mono cursor-pointer hover:text-stone-300 list-none flex items-center gap-1.5">
                    <ChevronRight size={11} className="group-open:rotate-90 transition-transform" />
                    Paste JSON instead
                  </summary>
                  <div className="mt-3">
                    <textarea
                      value={importText}
                      onChange={e => setImportText(e.target.value)}
                      placeholder='{"items":[{"id":0,"text":"Water",...}]} or graph export'
                      className="w-full h-24 bg-stone-950/60 border border-stone-700/60 rounded-md px-3 py-2 text-[11px] text-stone-200 placeholder-stone-600 focus:outline-none focus:border-amber-700/70 font-mono resize-none"
                    />
                    <button onClick={importPastedJSON}
                            className="mt-2 w-full bg-stone-900 hover:bg-stone-800 border border-stone-700 text-stone-200 text-[11px] uppercase tracking-widest font-mono py-2 rounded-md flex items-center justify-center gap-1.5">
                      <Upload size={12} />
                      Parse JSON
                    </button>
                    <p className="text-[10px] text-stone-600 font-mono mt-2 leading-relaxed">
                      Accepts uncompressed .ic JSON, our graph export, or the old localStorage format.
                    </p>
                  </div>
                </details>

                {/* Export section */}
                <div className="mt-7 pt-5 border-t border-stone-800 space-y-2">
                  <p className="text-[10px] uppercase tracking-widest text-stone-500 font-mono mb-1">
                    Export
                  </p>
                  <button onClick={exportIC}
                          className="w-full bg-amber-900/40 hover:bg-amber-900/60 border border-amber-800/40 text-amber-200 text-[11px] uppercase tracking-widest font-mono py-2 rounded-md flex items-center justify-center gap-2">
                    <Download size={12} />
                    Save as .ic
                  </button>
                  <button onClick={exportData}
                          className="w-full bg-stone-900 hover:bg-stone-800 border border-stone-700 text-stone-300 text-[11px] uppercase tracking-widest font-mono py-2 rounded-md flex items-center justify-center gap-2">
                    <FileJson size={12} />
                    Save graph as JSON
                  </button>
                  <p className="text-[10px] text-stone-600 font-mono leading-relaxed pt-1">
                    .ic round-trips back into the game. JSON keeps everything in this tool's own format.
                  </p>
                </div>

                <div className="mt-5 pt-5 border-t border-stone-800">
                  <button onClick={wipeAll}
                          className="w-full bg-rose-950/30 hover:bg-rose-950/50 border border-rose-900/40 text-rose-300 text-[11px] uppercase tracking-widest font-mono py-2 rounded-md flex items-center justify-center gap-2">
                    <Trash2 size={12} />
                    Reset everything
                  </button>
                </div>
              </div>
            )}

            {activeTab === 'search' && (
              <div className="p-5">
                <h2 style={{ fontFamily: "'Fraunces', serif" }} className="text-lg text-stone-100 font-light mb-3">
                  Browse elements
                </h2>

                <div className="relative mb-3">
                  <Search size={13} className="absolute left-3 top-1/2 -translate-y-1/2 text-stone-500" />
                  <input
                    value={search}
                    onChange={e => setSearch(e.target.value)}
                    placeholder="Filter by name…"
                    className="w-full bg-stone-950/60 border border-stone-700/60 rounded-md pl-9 pr-3 py-2 text-sm text-stone-100 placeholder-stone-500 focus:outline-none focus:border-amber-700/70 font-mono"
                  />
                </div>

                <button onClick={() => setHideIsolated(v => !v)}
                        className="w-full mb-4 text-[11px] uppercase tracking-widest font-mono py-2 rounded-md border border-stone-700 text-stone-300 hover:bg-stone-900 flex items-center justify-center gap-2">
                  {hideIsolated ? <Eye size={12} /> : <EyeOff size={12} />}
                  {hideIsolated ? 'Show' : 'Hide'} unconnected
                </button>

                <div className="space-y-0.5">
                  {elements
                    .filter(e => !search || e.name.toLowerCase().includes(search.toLowerCase()))
                    .sort((a, b) => (depthMap.get(a.name) ?? 0) - (depthMap.get(b.name) ?? 0) || a.name.localeCompare(b.name))
                    .map(e => {
                      const d = depthMap.get(e.name) ?? 0;
                      const isSel = selected === e.name;
                      const color = depthColor(d, maxDepth);
                      return (
                        <button
                          key={e.name}
                          onClick={() => { setSelected(e.name); setActiveTab('search'); }}
                          className={`group w-full text-left px-2.5 py-1.5 rounded flex items-center gap-2.5 font-mono text-xs transition-colors ${
                            isSel ? 'bg-stone-800/80 text-stone-100' : 'text-stone-300 hover:bg-stone-900/60'
                          }`}
                        >
                          <span className="w-1 h-4 rounded-full" style={{ background: color }} />
                          <span className="text-base">{e.emoji}</span>
                          <span className="flex-1 truncate">{e.name}</span>
                          <span className="text-[10px] text-stone-600">d{d}</span>
                        </button>
                      );
                    })}
                </div>
                {elements.length === 0 && (
                  <p className="text-xs text-stone-600 font-mono text-center py-8">No elements yet.</p>
                )}
              </div>
            )}

            {activeTab === 'about' && (
              <div className="p-5 text-sm text-stone-400 leading-relaxed space-y-4 font-mono">
                <div>
                  <h2 style={{ fontFamily: "'Fraunces', serif" }} className="text-lg text-stone-100 font-light mb-2 not-italic">
                    How this works
                  </h2>
                  <p className="text-xs">
                    Infinite Craft has a built-in save export. The <span className="text-amber-600">.ic</span> file
                    it produces is gzipped JSON and includes every recipe you've discovered.
                  </p>
                </div>

                <div className="border-l-2 border-amber-800/50 pl-3 py-1">
                  <p className="text-[10px] uppercase tracking-widest text-amber-700">Step 1</p>
                  <p className="text-xs mt-1 text-stone-300">
                    In the game, open <span className="text-stone-100">Settings</span> →
                    export your save. You'll get a <span className="text-stone-100">.ic</span> file.
                  </p>
                </div>

                <div className="border-l-2 border-amber-800/50 pl-3 py-1">
                  <p className="text-[10px] uppercase tracking-widest text-amber-700">Step 2</p>
                  <p className="text-xs mt-1 text-stone-300">
                    Drop it into the Save tab. Elements and recipes both load.
                  </p>
                </div>

                <div className="border-l-2 border-amber-800/50 pl-3 py-1">
                  <p className="text-[10px] uppercase tracking-widest text-amber-700">Step 3</p>
                  <p className="text-xs mt-1 text-stone-300">
                    Keep playing — re-export and drop in again to merge new finds. Or log
                    individual recipes by hand on the Log tab.
                  </p>
                </div>

                <div className="pt-2 border-t border-stone-800">
                  <p className="text-[10px] uppercase tracking-widest text-stone-600 mb-2">Controls</p>
                  <ul className="text-xs space-y-1.5 text-stone-400">
                    <li><span className="text-stone-200">Drag</span> a node to pin it (gold dot = pinned)</li>
                    <li><span className="text-stone-200">Double-click</span> a node to unpin</li>
                    <li><span className="text-stone-200">Click</span> a node to highlight neighbors</li>
                    <li><span className="text-stone-200">Scroll</span> to zoom, drag background to pan</li>
                  </ul>
                </div>

                <div className="pt-2 border-t border-stone-800">
                  <p className="text-[10px] uppercase tracking-widest text-stone-600 mb-2">Color by depth</p>
                  <div className="flex items-center gap-1 text-xs">
                    <div className="w-6 h-2 rounded-l" style={{ background: depthColor(0, 5) }} />
                    <div className="w-6 h-2" style={{ background: depthColor(1, 5) }} />
                    <div className="w-6 h-2" style={{ background: depthColor(2, 5) }} />
                    <div className="w-6 h-2" style={{ background: depthColor(3, 5) }} />
                    <div className="w-6 h-2" style={{ background: depthColor(4, 5) }} />
                    <div className="w-6 h-2 rounded-r" style={{ background: depthColor(5, 5) }} />
                  </div>
                  <p className="text-[10px] text-stone-600 mt-1.5">
                    Base elements (gold) → derived (cool). Deeper = more crafting steps from base.
                  </p>
                </div>
              </div>
            )}
          </div>
        </aside>

        {/* Graph + Details */}
        <main className="flex-1 relative min-w-0">
          <GraphCanvas
            elements={elements}
            recipes={recipes}
            selected={selected}
            onSelect={setSelected}
            search={search}
            hideIsolated={hideIsolated}
            depthMap={depthMap}
            maxDepth={maxDepth}
            resetKey={resetKey}
          />

          {/* Details panel */}
          {selectedDetails && (
            <div className="absolute top-4 left-4 w-72 bg-stone-950/90 backdrop-blur-md border border-stone-700/60 rounded-lg p-4 shadow-2xl shadow-black/50 z-10">
              <div className="flex items-start gap-3">
                <div className="text-3xl leading-none">{selectedDetails.el.emoji}</div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center justify-between gap-2">
                    <h3 style={{ fontFamily: "'Fraunces', serif" }} className="text-lg text-stone-100 font-light truncate">
                      {selectedDetails.el.name}
                    </h3>
                    <button onClick={() => setSelected(null)} className="text-stone-500 hover:text-stone-200">
                      <X size={14} />
                    </button>
                  </div>
                  <p className="text-[10px] uppercase tracking-widest text-stone-500 font-mono">
                    Depth {selectedDetails.depth}
                    <span className="mx-1.5 text-stone-700">·</span>
                    {selectedDetails.madeBy.length} {selectedDetails.madeBy.length === 1 ? 'recipe' : 'recipes'} in
                    <span className="mx-1.5 text-stone-700">·</span>
                    {selectedDetails.usedIn.length} out
                  </p>
                </div>
              </div>

              {selectedDetails.madeBy.length > 0 && (
                <div className="mt-4">
                  <p className="text-[10px] uppercase tracking-widest text-stone-500 font-mono mb-1.5">Made from</p>
                  <div className="space-y-1">
                    {selectedDetails.madeBy.map(r => {
                      const ea = elementMap.get(r.a), eb = elementMap.get(r.b);
                      return (
                        <div key={r.id} className="text-xs font-mono text-stone-300 flex items-center gap-1.5">
                          <button onClick={() => setSelected(r.a)} className="hover:text-amber-500 flex items-center gap-1">
                            <span>{ea?.emoji}</span><span>{r.a}</span>
                          </button>
                          <span className="text-stone-600">+</span>
                          <button onClick={() => setSelected(r.b)} className="hover:text-amber-500 flex items-center gap-1">
                            <span>{eb?.emoji}</span><span>{r.b}</span>
                          </button>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {selectedDetails.usedIn.length > 0 && (
                <div className="mt-4">
                  <p className="text-[10px] uppercase tracking-widest text-stone-500 font-mono mb-1.5">Used in</p>
                  <div className="space-y-1 max-h-32 overflow-y-auto">
                    {selectedDetails.usedIn.map(r => {
                      const er = elementMap.get(r.result);
                      const other = r.a === selected ? r.b : r.a;
                      const eo = elementMap.get(other);
                      return (
                        <div key={r.id} className="text-xs font-mono text-stone-300 flex items-center gap-1.5">
                          <span className="text-stone-600">+</span>
                          <button onClick={() => setSelected(other)} className="hover:text-amber-500 flex items-center gap-1">
                            <span>{eo?.emoji}</span><span>{other}</span>
                          </button>
                          <span className="text-amber-700/70">→</span>
                          <button onClick={() => setSelected(r.result)} className="hover:text-amber-500 flex items-center gap-1">
                            <span>{er?.emoji}</span><span className="truncate">{r.result}</span>
                          </button>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              <button onClick={() => removeElement(selectedDetails.el.name)}
                      className="mt-4 w-full text-[10px] uppercase tracking-widest text-rose-500/70 hover:text-rose-400 font-mono py-1.5 border border-rose-900/30 rounded hover:border-rose-800/50 transition-colors flex items-center justify-center gap-1.5">
                <Trash2 size={10} />
                Remove element
              </button>
            </div>
          )}
        </main>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
